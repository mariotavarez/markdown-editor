<svg xmlns="http://www.w3.org/2000/svg" width="740" height="440" viewBox="0 0 740 440">
  <defs>
    <style>
      .bg { fill: #111827; }
      .panel { fill: #1f2937; }
      .toolbar { fill: #1f2937; }
      .header { fill: #111827; }
      .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .dim { fill: #4b5563; }
      .muted { fill: #6b7280; }
      .light { fill: #d1d5db; }
      .white { fill: #f9fafb; }
      .purple { fill: #a78bfa; }
      .green { fill: #34d399; }
      .blue { fill: #60a5fa; }
      .heading { fill: #f9fafb; font-weight: 700; }
      .code-bg { fill: #0d1117; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="740" height="440" rx="12" class="bg"/>

  <!-- Header bar -->
  <rect width="740" height="40" class="header"/>
  <text x="20" y="25" class="sans white" font-size="14" font-weight="700">MarkFlow</text>
  <text x="100" y="25" class="sans muted" font-size="12">Write in Markdown. See it rendered. Ship it anywhere.</text>
  <!-- Theme toggle -->
  <rect x="594" y="10" width="60" height="22" rx="11" fill="#374151"/>
  <circle cx="606" cy="21" r="9" fill="#6b7280"/>
  <text x="620" y="25" class="sans muted" font-size="11">Dark</text>
  <!-- Export button -->
  <rect x="660" y="10" width="64" height="22" rx="6" fill="#4f46e5"/>
  <text x="692" y="25" class="sans white" font-size="11" text-anchor="middle">Export</text>

  <!-- Toolbar -->
  <rect y="40" width="740" height="32" class="toolbar"/>
  <line x1="0" y1="40" x2="740" y2="40" stroke="#374151" stroke-width="1"/>
  <line x1="0" y1="72" x2="740" y2="72" stroke="#374151" stroke-width="1"/>
  <!-- Toolbar buttons -->
  <rect x="12" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="23" y="60" class="sans white" font-size="11" font-weight="700" text-anchor="middle">B</text>
  <rect x="40" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="51" y="60" class="sans" fill="#d1d5db" font-size="11" font-style="italic" text-anchor="middle">I</text>
  <rect x="68" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="79" y="60" class="sans" fill="#d1d5db" font-size="11" font-weight="700" text-anchor="middle">H</text>
  <line x1="100" y1="48" x2="100" y2="64" stroke="#374151" stroke-width="1"/>
  <rect x="108" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="119" y="60" class="sans" fill="#60a5fa" font-size="10" text-anchor="middle">link</text>
  <rect x="136" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="147" y="60" class="mono" fill="#d1d5db" font-size="10" text-anchor="middle">`c`</text>
  <line x1="168" y1="48" x2="168" y2="64" stroke="#374151" stroke-width="1"/>
  <rect x="176" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="187" y="60" class="sans" fill="#d1d5db" font-size="10" text-anchor="middle">"</text>
  <rect x="204" y="48" width="22" height="16" rx="3" fill="#374151"/>
  <text x="215" y="60" class="sans" fill="#d1d5db" font-size="10" text-anchor="middle">-</text>

  <!-- Editor pane (left) -->
  <rect x="0" y="72" width="370" height="368" class="panel"/>
  <text x="12" y="90" class="sans muted" font-size="10" font-weight="600">EDITOR</text>
  <!-- Line numbers -->
  <rect x="0" y="72" width="28" height="368" fill="#111827"/>
  <text x="14" y="104" class="mono dim" font-size="11" text-anchor="middle">1</text>
  <text x="14" y="120" class="mono dim" font-size="11" text-anchor="middle">2</text>
  <text x="14" y="136" class="mono dim" font-size="11" text-anchor="middle">3</text>
  <text x="14" y="152" class="mono dim" font-size="11" text-anchor="middle">4</text>
  <text x="14" y="168" class="mono dim" font-size="11" text-anchor="middle">5</text>
  <text x="14" y="184" class="mono dim" font-size="11" text-anchor="middle">6</text>
  <text x="14" y="200" class="mono dim" font-size="11" text-anchor="middle">7</text>
  <text x="14" y="216" class="mono dim" font-size="11" text-anchor="middle">8</text>
  <text x="14" y="232" class="mono dim" font-size="11" text-anchor="middle">9</text>
  <text x="14" y="248" class="mono dim" font-size="11" text-anchor="middle">10</text>
  <text x="14" y="264" class="mono dim" font-size="11" text-anchor="middle">11</text>
  <text x="14" y="280" class="mono dim" font-size="11" text-anchor="middle">12</text>
  <!-- Editor content -->
  <text x="36" y="104" class="mono purple" font-size="12"># Getting Started</text>
  <text x="36" y="120" class="mono light" font-size="12"> </text>
  <text x="36" y="136" class="mono light" font-size="12">Welcome to **MarkFlow**, a fast,</text>
  <text x="36" y="152" class="mono light" font-size="12">distraction-free Markdown editor.</text>
  <text x="36" y="168" class="mono light" font-size="12"> </text>
  <text x="36" y="184" class="mono purple" font-size="12">## Features</text>
  <text x="36" y="200" class="mono light" font-size="12"> </text>
  <text x="36" y="216" class="mono light" font-size="12">- Live split-pane preview</text>
  <text x="36" y="232" class="mono light" font-size="12">- Formatting toolbar</text>
  <text x="36" y="248" class="mono light" font-size="12">- Export to HTML or `.md`</text>
  <text x="36" y="264" class="mono light" font-size="12"> </text>
  <text x="36" y="280" class="mono muted" font-size="12">```javascript</text>
  <text x="36" y="296" class="mono green" font-size="12">const</text><text x="70" y="296" class="mono light" font-size="12"> msg = </text><text x="112" y="296" class="mono" fill="#fbbf24" font-size="12">'hello world'</text>
  <text x="36" y="312" class="mono muted" font-size="12">```</text>
  <!-- Cursor -->
  <rect x="85" y="299" width="2" height="14" fill="#a78bfa"/>

  <!-- Divider -->
  <rect x="369" y="72" width="2" height="368" fill="#374151"/>

  <!-- Preview pane (right) -->
  <rect x="371" y="72" width="369" height="368" fill="#111827"/>
  <text x="383" y="90" class="sans muted" font-size="10" font-weight="600">PREVIEW</text>
  <!-- Rendered content -->
  <text x="383" y="112" class="sans heading" font-size="18">Getting Started</text>
  <line x1="383" y1="116" x2="720" y2="116" stroke="#374151" stroke-width="1"/>
  <text x="383" y="132" class="sans light" font-size="12">Welcome to </text>
  <text x="458" y="132" class="sans white" font-size="12" font-weight="700">MarkFlow</text>
  <text x="510" y="132" class="sans light" font-size="12">, a fast,</text>
  <text x="383" y="148" class="sans light" font-size="12">distraction-free Markdown editor.</text>
  <text x="383" y="172" class="sans heading" font-size="15">Features</text>
  <!-- List items -->
  <circle cx="391" cy="191" r="3" fill="#6b7280"/>
  <text x="402" y="195" class="sans light" font-size="12">Live split-pane preview</text>
  <circle cx="391" cy="209" r="3" fill="#6b7280"/>
  <text x="402" y="213" class="sans light" font-size="12">Formatting toolbar</text>
  <circle cx="391" cy="227" r="3" fill="#6b7280"/>
  <text x="402" y="231" class="sans light" font-size="12">Export to HTML or </text>
  <rect x="527" y="220" width="28" height="14" rx="3" fill="#1f2937"/>
  <text x="541" y="231" class="mono" fill="#e2e8f0" font-size="11" text-anchor="middle">.md</text>
  <!-- Code block -->
  <rect x="383" y="248" width="332" height="56" rx="6" class="code-bg"/>
  <text x="395" y="263" class="mono muted" font-size="10">javascript</text>
  <text x="395" y="281" class="mono green" font-size="12">const</text>
  <text x="427" y="281" class="mono light" font-size="12"> msg = </text>
  <text x="469" y="281" class="mono" fill="#fbbf24" font-size="12">'hello world'</text>

  <!-- Status bar -->
  <rect x="0" y="408" width="740" height="32" fill="#1f2937"/>
  <line x1="0" y1="408" x2="740" y2="408" stroke="#374151" stroke-width="1"/>
  <text x="20" y="428" class="sans muted" font-size="11">Words: 24</text>
  <text x="100" y="428" class="sans muted" font-size="11">Characters: 142</text>
  <text x="216" y="428" class="sans muted" font-size="11">Lines: 14</text>
  <text x="288" y="428" class="sans muted" font-size="11">~1 min read</text>
</svg>
